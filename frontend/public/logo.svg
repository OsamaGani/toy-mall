<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 86" width="260" height="86">
  <!-- Talle Furniture Mart — primary brand logo.
       Premium chair mark + bold TALLE wordmark. No subtitle text —
       subtitles render as illegible scratch at navbar sizes, and
       premium furniture brands (Herman Miller, Steelcase, Knoll,
       Vitra) all use wordmark-only logos for exactly this reason.
       FURNITURE MART context comes from the surrounding copy in
       footer / invoice / page meta titles. -->

  <!-- Mark: rounded charcoal square, flush to left edge -->
  <rect x="0" y="0" width="86" height="86" rx="14" fill="#111827"/>

  <!-- Single-line architectural chair drawing in white -->
  <g fill="none" stroke="#ffffff" stroke-width="5.5" stroke-linecap="square" stroke-linejoin="miter">
    <!-- chair back -->
    <line x1="30" y1="22" x2="30" y2="62"/>
    <!-- seat -->
    <line x1="30" y1="54" x2="58" y2="54"/>
    <!-- front leg -->
    <line x1="58" y1="54" x2="58" y2="70"/>
  </g>
  <!-- Red accent dot — single brand-colour touch -->
  <circle cx="30" cy="17" r="4" fill="#e53935"/>

  <!-- TALLE wordmark — Arial Black at 56pt is the visual hero now.
       Letter-spacing 1 (was 4) packs the letters into a tight,
       declarative block. Renders cleanly at any navbar size. -->
  <text x="100" y="62"
        font-family="'Arial Black', 'Helvetica Black', Arial, sans-serif"
        font-size="56"
        font-weight="900"
        letter-spacing="1"
        fill="#111827">TALLE</text>
</svg>
