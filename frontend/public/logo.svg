<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 296 86" width="296" height="86">
  <!-- Talle Furniture Mart — primary logo (dark wordmark on light bg).
       viewBox tightened to wrap the content exactly so the <img> tag
       reports the true visual width and there are no big empty margins
       in the navbar / footer / mobile auth bars. -->

  <!-- Mark: rounded charcoal square (now flush to the left edge) -->
  <rect x="0" y="0" width="86" height="86" rx="12" fill="#111827"/>

  <!-- Single-line chair drawing in white, geometric, no shading -->
  <g fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="square" stroke-linejoin="miter">
    <line x1="30" y1="20" x2="30" y2="60"/>
    <line x1="30" y1="52" x2="56" y2="52"/>
    <line x1="56" y1="52" x2="56" y2="68"/>
  </g>
  <!-- Red accent dot — the brand colour as a single precise mark -->
  <circle cx="30" cy="16" r="3.5" fill="#e53935"/>

  <!-- TALLE wordmark — black, tracked, geometric -->
  <text x="102" y="45"
        font-family="'Poppins', 'Helvetica Neue', Arial, sans-serif"
        font-size="34"
        font-weight="800"
        letter-spacing="4"
        fill="#111827">TALLE</text>

  <!-- FURNITURE MART rule + sub-line, tight kerning -->
  <line x1="104" y1="55" x2="216" y2="55" stroke="#111827" stroke-width="1.5"/>
  <text x="104" y="73"
        font-family="'Poppins', 'Helvetica Neue', Arial, sans-serif"
        font-size="10"
        font-weight="600"
        letter-spacing="5"
        fill="#374151">FURNITURE MART</text>
</svg>
