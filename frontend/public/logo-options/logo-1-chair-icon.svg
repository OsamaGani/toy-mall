<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" width="360" height="96">
  <!-- Option 1 (refined): Architectural chair mark + wordmark
       Inspired by Herman Miller / Steelcase identity work. Single weight,
       geometric, no decoration. Reads instantly at favicon size. -->

  <!-- Outer mark: rounded square, deep charcoal not red — premium feel -->
  <rect x="6" y="6" width="84" height="84" rx="12" fill="#111827"/>

  <!-- Stylised chair: a single bold "h" silhouette where the down-stroke
       is the chair back and the curve is the seat. Geometric, no shading. -->
  <g fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="square" stroke-linejoin="miter">
    <!-- chair back -->
    <line x1="36" y1="24" x2="36" y2="64"/>
    <!-- seat (horizontal) -->
    <line x1="36" y1="56" x2="62" y2="56"/>
    <!-- front leg -->
    <line x1="62" y1="56" x2="62" y2="72"/>
    <!-- floor base line (subtle) -->
  </g>
  <!-- Single red accent dot — the brand colour as a precision detail -->
  <circle cx="36" cy="20" r="3.5" fill="#e53935"/>

  <!-- TALLE wordmark — black, tracked, geometric -->
  <text x="108" y="50"
        font-family="'Poppins', 'Helvetica Neue', sans-serif"
        font-size="34"
        font-weight="800"
        letter-spacing="4"
        fill="#111827">TALLE</text>

  <!-- FURNITURE MART rule + sub-line, tight kerning -->
  <line x1="110" y1="60" x2="222" y2="60" stroke="#111827" stroke-width="1.5"/>
  <text x="110" y="78"
        font-family="'Poppins', 'Helvetica Neue', sans-serif"
        font-size="10"
        font-weight="600"
        letter-spacing="5"
        fill="#374151">FURNITURE MART</text>
</svg>
