<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" width="360" height="96">
  <!-- Option 5: Lowercase serif + minimalist chair mark
       Inspired by Knoll, Carl Hansen, &Tradition. Lowercase serif feels
       softer / more domestic than uppercase, the mark is a single
       geometric chair silhouette in negative space. -->

  <!-- Minimalist chair mark: a perfect square with chair seat in negative space -->
  <g transform="translate(8, 14)">
    <rect width="68" height="68" rx="4" fill="#111827"/>
    <!-- Chair: stem + seat + legs in white -->
    <g fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="square">
      <line x1="24" y1="18" x2="24" y2="44"/>           <!-- back -->
      <line x1="24" y1="44" x2="46" y2="44"/>           <!-- seat -->
      <line x1="46" y1="44" x2="46" y2="54"/>           <!-- front leg -->
      <line x1="20" y1="54" x2="50" y2="54"/>           <!-- floor -->
    </g>
    <!-- Single red dot — top of the chair back -->
    <circle cx="24" cy="14" r="3" fill="#e53935"/>
  </g>

  <!-- "talle" lowercase serif — refined and soft -->
  <text x="92" y="60"
        font-family="'Playfair Display', Georgia, serif"
        font-size="50"
        font-weight="500"
        letter-spacing="-1"
        fill="#111827">talle</text>

  <!-- furniture mart — lowercase to match -->
  <text x="94" y="82"
        font-family="'Poppins', 'Helvetica Neue', sans-serif"
        font-size="11"
        font-weight="600"
        letter-spacing="3"
        fill="#6b7280">furniture mart</text>
</svg>
