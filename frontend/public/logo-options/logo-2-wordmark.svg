<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" width="360" height="96">
  <!-- Option 2 (refined): Pure editorial wordmark
       Inspired by Knoll / Cassina identity. No icon, no tagline clutter
       — just precision letterforms with a single red accent dot. -->

  <!-- "Talle" in elegant display serif, lowercase, very large -->
  <text x="14" y="62"
        font-family="'Playfair Display', Georgia, serif"
        font-size="58"
        font-weight="500"
        letter-spacing="-1"
        fill="#111827">Talle</text>

  <!-- Hairline rule under the wordmark -->
  <line x1="16" y1="74" x2="148" y2="74" stroke="#111827" stroke-width="1"/>

  <!-- FURNITURE MART in tracked small caps -->
  <text x="16" y="88"
        font-family="'Poppins', 'Helvetica Neue', sans-serif"
        font-size="9"
        font-weight="600"
        letter-spacing="5"
        fill="#111827">FURNITURE MART</text>

  <!-- The red accent dot — brand colour reduced to a single precise mark -->
  <circle cx="160" cy="34" r="4" fill="#e53935"/>
</svg>
