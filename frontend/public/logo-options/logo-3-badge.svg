<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 110" width="360" height="110">
  <!-- Option 3 (refined): Heritage seal + wordmark
       Inspired by Royal Warrant / luxury maison crests. Charcoal + brass
       (warm gold) instead of red — feels stamped, established, premium. -->

  <defs>
    <!-- Brass gradient for the seal -->
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#c9a05c"/>
      <stop offset="50%" stop-color="#b08b46"/>
      <stop offset="100%" stop-color="#8a6a30"/>
    </linearGradient>
    <path id="seal-top"    d="M 16 56 A 40 40 0 0 1 96 56" fill="none"/>
    <path id="seal-bottom" d="M 16 56 A 40 40 0 0 0 96 56" fill="none"/>
  </defs>

  <!-- Outer thin gold ring -->
  <circle cx="56" cy="56" r="48" fill="none" stroke="url(#brass)" stroke-width="1.5"/>
  <!-- Inner solid gold ring -->
  <circle cx="56" cy="56" r="40" fill="none" stroke="url(#brass)" stroke-width="3.5"/>
  <!-- Innermost hairline -->
  <circle cx="56" cy="56" r="32" fill="none" stroke="url(#brass)" stroke-width="0.8"/>

  <!-- Centre "T" monogram in serif -->
  <text x="56" y="66"
        text-anchor="middle"
        font-family="'Playfair Display', Georgia, serif"
        font-size="36"
        font-weight="900"
        fill="#111827">T</text>

  <!-- Top curved text -->
  <text font-family="'Poppins', 'Helvetica Neue', sans-serif"
        font-size="5.5"
        font-weight="700"
        letter-spacing="3"
        fill="#111827">
    <textPath href="#seal-top" startOffset="50%" text-anchor="middle">
      ✦  TALLE FURNITURE MART  ✦
    </textPath>
  </text>
  <!-- Bottom curved text -->
  <text font-family="'Poppins', 'Helvetica Neue', sans-serif"
        font-size="5"
        font-weight="600"
        letter-spacing="2.5"
        fill="#6b7280">
    <textPath href="#seal-bottom" startOffset="50%" text-anchor="middle">
      EST.  2010   ·   MUMBAI
    </textPath>
  </text>

  <!-- Wordmark beside the seal -->
  <text x="124" y="58"
        font-family="'Playfair Display', Georgia, serif"
        font-size="40"
        font-weight="900"
        letter-spacing="0"
        fill="#111827">Talle</text>
  <line x1="126" y1="68" x2="240" y2="68" stroke="url(#brass)" stroke-width="1.5"/>
  <text x="126" y="84"
        font-family="'Poppins', 'Helvetica Neue', sans-serif"
        font-size="10"
        font-weight="700"
        letter-spacing="6"
        fill="#111827">FURNITURE MART</text>
</svg>
