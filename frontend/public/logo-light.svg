<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 86" width="260" height="86">
  <!-- Talle Furniture Mart — light variant (white wordmark on dark bg).
       Same architecture as /logo.svg: chair mark + bold TALLE wordmark,
       no subtitle. -->

  <!-- Mark: rounded charcoal square — same as primary -->
  <rect x="0" y="0" width="86" height="86" rx="14" fill="#111827"/>

  <!-- Single-line architectural chair drawing in white -->
  <g fill="none" stroke="#ffffff" stroke-width="5.5" stroke-linecap="square" stroke-linejoin="miter">
    <line x1="30" y1="22" x2="30" y2="62"/>
    <line x1="30" y1="54" x2="58" y2="54"/>
    <line x1="58" y1="54" x2="58" y2="70"/>
  </g>
  <!-- Red accent dot — the brand colour stays red on every background -->
  <circle cx="30" cy="17" r="4" fill="#e53935"/>

  <!-- TALLE wordmark in white -->
  <text x="100" y="62"
        font-family="'Arial Black', 'Helvetica Black', Arial, sans-serif"
        font-size="56"
        font-weight="900"
        letter-spacing="1"
        fill="#ffffff">TALLE</text>
</svg>
